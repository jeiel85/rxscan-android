registry_version: "1.0.0"
checked_date: "2026-06-22"
data_go_kr_access:
  requires_application: true
  service_key_env: DATA_GO_KR_SERVICE_KEY
  key_handling: "Use the decoded public-data portal ServiceKey value; the builder URL-encodes query parameters."
  approval_note: "Development use is requested through data.go.kr 활용신청. Production use may require API-specific automatic or review approval."
  secret_policy: "Do not commit, log, or write ServiceKey values to artifacts."

sources:
